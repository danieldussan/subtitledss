[audio]
source = "system"
device = "default"
sample_rate = 16000

[whisper]
model = "base"
language = "auto"
threads = 4
gpu = false

[overlay]
x = 100
y = 500
width = 600
height = 100
opacity = 0.9
always_on_top = true
click_through = false
font_size = 24
font_color = "#ffffff"
background_color = "#00000080"
auto_hide = true
auto_hide_delay = 5000

[translation]
enabled = false
source_lang = "en"
target_lang = "es"

[shortcuts]
toggle_capture = "Ctrl+Shift+S"
toggle_overlay = "Ctrl+Shift+O"
toggle_translation = "Ctrl+Shift+T"
clear_history = "Ctrl+Shift+H"
