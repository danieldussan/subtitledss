<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="url(#accent)" stroke-width="8"/>
  
  <!-- Subtitle bar background -->
  <rect x="100" y="280" rx="16" ry="16" width="312" height="100" fill="#0f172a" opacity="0.8"/>
  
  <!-- Subtitle text lines -->
  <rect x="130" y="300" rx="4" ry="4" width="180" height="12" fill="url(#accent)" opacity="0.9"/>
  <rect x="150" y="324" rx="4" ry="4" width="140" height="12" fill="url(#accent)" opacity="0.7"/>
  <rect x="170" y="348" rx="4" ry="4" width="100" height="12" fill="url(#accent)" opacity="0.5"/>
  
  <!-- Microphone icon -->
  <g transform="translate(256, 180)">
    <!-- Mic body -->
    <rect x="-24" y="-60" rx="24" ry="24" width="48" height="80" fill="url(#accent)"/>
    <!-- Mic stand arc -->
    <path d="M-40,20 Q-40,60 0,60 Q40,60 40,20" stroke="url(#accent)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Mic stand line -->
    <line x1="0" y1="60" x2="0" y2="90" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <!-- Mic base -->
    <line x1="-20" y1="90" x2="20" y2="90" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Real-time pulse indicator -->
  <g transform="translate(380, 140)">
    <circle cx="0" cy="0" r="8" fill="url(#pulse)"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="url(#pulse)" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="url(#pulse)" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Sound waves from mic -->
  <g opacity="0.4">
    <path d="M310,160 Q330,180 310,200" stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M325,145 Q355,180 325,215" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
