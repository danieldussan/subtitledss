name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3.12"

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            pkg-config \
            cmake \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            ffmpeg

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Build Rust backend (CPU)
        run: cargo build --release
        working-directory: src-tauri

      - name: Build AppImage
        run: |
          # Download linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          cp src-tauri/target/release/subtitledss AppDir/usr/bin/subtitledss
          cp aur/subtitledss.desktop AppDir/usr/share/applications/subtitledss.desktop
          cp src-tauri/icons/icon.png AppDir/usr/share/icons/hicolor/512x512/apps/subtitledss.png

          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          exec /usr/bin/subtitledss "$@"
          EOF
          chmod +x AppDir/AppRun

          # Build AppImage
          ./linuxdeploy --appdir AppDir --output appimage

      - name: Build .deb package
        run: |
          # Create deb structure
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb/usr/share/licenses/subtitledss

          cp src-tauri/target/release/subtitledss deb/usr/bin/subtitledss
          cp aur/subtitledss.desktop deb/usr/share/applications/subtitledss.desktop
          cp src-tauri/icons/icon.png deb/usr/share/icons/hicolor/512x512/apps/subtitledss.png
          cp LICENSE deb/usr/share/licenses/subtitledss/LICENSE

          # Create control file
          cat > deb/DEBIAN/control << EOF
          Package: subtitledss
          Version: ${GITHUB_REF_NAME#v}
          Section: sound
          Priority: optional
          Architecture: amd64
          Depends: libasound2, libpipewire-0.3-0, libssl3, ffmpeg
          Maintainer: ddussan <ddussan@github.com>
          Description: Real-time subtitle overlay for Linux and macOS
           Real-time subtitle overlay powered by Whisper.cpp.
           Captures system audio and displays subtitles in real-time.
          EOF

          dpkg-deb --build deb subtitledss-${GITHUB_REF_NAME#v}-amd64.deb

      - name: Build raw binary
        run: |
          tar -czf subtitledss-${GITHUB_REF_NAME#v}-x86_64.tar.gz -C src-tauri/target/release subtitledss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            subtitledss-*.AppImage
            subtitledss-*.deb
            subtitledss-*.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Build Rust backend (Metal)
        run: cargo build --release --features metal
        working-directory: src-tauri

      - name: Build DMG
        run: cargo tauri build
        working-directory: src-tauri

      - name: Build raw binary
        run: |
          tar -czf subtitledss-${GITHUB_REF_NAME#v}-aarch64.tar.gz \
            -C src-tauri/target/release subtitledss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            subtitledss-*.tar.gz

  create-release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "subtitledss ${{ github.ref_name }}"
          body: |
            ## subtitledss ${{ github.ref_name }}

            Real-time subtitle overlay for Linux and macOS, powered by Whisper.cpp.

            ### Installation

            **macOS (DMG):**
            1. Download `subtitledss-*.dmg`
            2. Open the DMG and drag `subtitledss.app` to Applications
            3. First launch: right-click → Open (unsigned app)
            4. Microphone access: allow in System Preferences → Security & Privacy

            **macOS (manual):**
            ```bash
            tar -xzf subtitledss-*.tar.gz
            ./subtitledss
            ```

            **Linux (AppImage):**
            ```bash
            chmod +x subtitledss-*.AppImage
            ./subtitledss-*.AppImage
            ```

            **Linux (Debian/Ubuntu):**
            ```bash
            sudo dpkg -i subtitledss-*.deb
            ```

            **Linux (Arch):**
            ```bash
            tar -xzf subtitledss-*.tar.gz
            sudo cp subtitledss /usr/bin/subtitledss
            ```

            **System Audio on macOS:**
            Requires [BlackHole](https://github.com/ExistentialAudio/BlackHole) for system audio capture.
            See README for setup instructions.

            **GPU Acceleration:**
            - macOS: Metal (Apple Silicon) — included in DMG build
            - Linux: CUDA/Vulkan — build from source with `--features cuda`

            ### Changes
            - Real-time transcription with whisper.cpp
            - System audio capture (PipeWire on Linux, BlackHole on macOS)
            - Transparent subtitle overlay
            - System tray with global shortcuts
            - History with FTS5 search
            - Export to SRT/VTT/TXT/JSON
            - macOS support with Metal GPU acceleration
          files: |
            subtitledss-*.AppImage
            subtitledss-*.deb
            subtitledss-*.tar.gz
            subtitledss-*.dmg
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
